---
# Template for ansible/vault/secrets.yml — the gitignored, ansible-vault-
# encrypted file holding this deployment's secrets.
#
# Bootstrap (current — manual until the plane_secrets + plane_admin roles ship):
#   1. Generate values for every <…> placeholder below (e.g. `openssl rand -hex 32`).
#   2. Save as ansible/vault/secrets.yml (no extension change).
#   3. mkdir -p ~/.config/ansible && openssl rand -hex 24 \
#        > ~/.config/ansible/aac-coding-vault-pass && chmod 600 it. (Outside
#        the repo so multiple ansible projects on the same controller
#        can share it — ansible.cfg already points at it.)
#   4. ansible-vault encrypt vault/secrets.yml
#   5. Provision the host with `ansible-playbook plane.yml`. The plane stack
#      will come up but the workspace + admin token below are still empty.
#      Note: on a fresh DB the playbook blocks 8-10 minutes while the
#      migrator applies 121 sequential migrations. Don't open the URL in
#      a browser until the playbook returns — earlier loads will show the
#      "Plane didn't start up correctly!" banner from the web frontend.
#   6. Open https://<domain_plane>/ in a browser, sign up the first user
#      (becomes Instance Admin), create a workspace whose slug matches
#      `plane_workspace.slug` from host_vars, then go to Workspace Settings
#      → API tokens and mint a token.
#   7. Edit vault/secrets.yml to fill in `plane.admin_token` with that value
#      and re-run the playbook. plane_users + plane_projects will pick up
#      from there.
#
# Future (post Phase 3.5 — plane_secrets + plane_admin roles): steps 1, 6, 7
# go away; the playbook generates everything on first run and persists it
# back into this file automatically.

plane:
  secret_key: "<django-secret, 64 hex chars>"
  live_server_secret_key: "<live-server-secret, 64 hex chars>"
  postgres_password: "<alphanumeric, 32 chars>"
  rabbitmq_password: "<alphanumeric, 32 chars>"
  minio_access_key: "<alphanumeric, 20 chars>"
  minio_secret_key: "<alphanumeric, 40 chars>"
  # Workspace API token, minted post-bootstrap (see step 6 above).
  # Required by plane_users + plane_projects roles.
  admin_token: "<workspace api token>"
  # Password for the Instance Admin / Workspace Owner. Used by plane_admin
  # (Phase 3.5) when it creates the User row. Until then, set this to
  # whatever password you used when signing up via the UI.
  admin_password: "<admin password>"
