# plane_admin — bootstrap the Instance Admin + workspace + bootstrap
# API token via ORM. Runs against the host (not localhost): docker exec
# into the api container, then writes the resulting token back to the
# controller-local vault via the shared merge helper.

- name: Load plane vault secrets
  ansible.builtin.include_vars: "{{ playbook_dir }}/vault/{{ vault_secrets_file }}"
  no_log: true

- name: Assert role inputs are present
  ansible.builtin.assert:
    that:
      - plane_admin.email is defined and (plane_admin.email | length > 0)
      - plane_admin.full_name is defined and (plane_admin.full_name | length > 0)
      - plane.admin_password is defined and (plane.admin_password | length > 0)
      - plane_workspace.slug is defined and (plane_workspace.slug | length > 0)
      - plane_workspace.name is defined and (plane_workspace.name | length > 0)
    fail_msg: >-
      Missing inputs. Need: host_vars `plane_admin.email`,
      `plane_admin.full_name`, `plane_workspace.{slug,name}`, and vault
      `plane.admin_password` (auto-generated by plane_secrets).

# Safety-net: the `plane` role already blocked on api readiness, so
# this should pass on the first attempt. The retries cover a narrow
# api-crash-and-restart window between roles.
- name: Re-confirm Plane api is serving (safety net)
  # Same `manage.py shell -c` discipline as the plane role's wait loop:
  # bare `python -c` cannot import Django models without django.setup().
  ansible.builtin.shell: |
    docker compose -f {{ plane_admin_plane_dir }}/compose.yaml exec -T api \
      python manage.py shell -c "from plane.license.models import Instance; import sys; sys.exit(0 if Instance.objects.exists() else 1)"
  register: _api_ready
  until: _api_ready.rc == 0
  retries: "{{ plane_admin_api_ready_retries }}"
  delay: "{{ plane_admin_api_ready_delay }}"
  changed_when: false
  failed_when:
    - _api_ready.attempts | default(0) >= (plane_admin_api_ready_retries | int)
    - _api_ready.rc != 0

- name: Render bootstrap script to a temp file on the host
  ansible.builtin.template:
    src: bootstrap.py.j2
    dest: /tmp/plane_admin_bootstrap.py
    mode: "0600"
  no_log: true

# `cmd:` (not free-form) — Ansible's shell free-form parser treats bare
# `key=value` tokens as module args, and the python below has plenty.
- name: Run bootstrap script in api container
  ansible.builtin.shell:
    cmd: |
      cat /tmp/plane_admin_bootstrap.py | \
        docker compose -f {{ plane_admin_plane_dir }}/compose.yaml exec -T api python manage.py shell
  register: _bootstrap_result
  # Match any of the bootstrap script's "did something" markers (see
  # bootstrap.py.j2's emit() calls). Must include `instance-config-updated`
  # for the InstanceConfiguration step to register as changed.
  changed_when: >-
    '-created:' in (_bootstrap_result.stdout | default(''))
    or '-minted:' in (_bootstrap_result.stdout | default(''))
    or '-marked-' in (_bootstrap_result.stdout | default(''))
    or '-updated:' in (_bootstrap_result.stdout | default(''))

- name: Remove bootstrap script from host
  ansible.builtin.file:
    path: /tmp/plane_admin_bootstrap.py
    state: absent

- name: Show bootstrap events
  ansible.builtin.debug:
    var: _bootstrap_result.stdout_lines

# Pull the JSON blob out of stdout. If the marker is absent (e.g. the
# api wasn't ready and the script bailed with sys.exit(2)), the run
# already failed at the shell step; we won't get here.
- name: Parse bootstrap result JSON
  ansible.builtin.set_fact:
    _bootstrap_json: >-
      {{ (_bootstrap_result.stdout
          | regex_search('===PLANE_ADMIN_RESULT===\n(\{.*\})\n===END===', '\1')
          | first
          | from_json) }}
  no_log: true

- name: Capture bootstrap token
  ansible.builtin.set_fact:
    _bootstrap_token: "{{ _bootstrap_json.token }}"
  no_log: true

# Hand the token off to the merge helper so it lands in vault/secrets.yml
# under plane.admin_token. Subsequent plays in the same run pick it up
# via include_vars (plane_users, plane_projects, plane_bootstrap).
# `apply:` is the only way to push delegate_to/become into an included
# role's tasks — neither attribute is valid at the include_role level.
- name: Persist bootstrap token to vault
  ansible.builtin.include_role:
    name: plane_secrets
    tasks_from: merge.yml
    apply:
      delegate_to: localhost
      become: false
  vars:
    vault_merge_keys:
      plane:
        admin_token: "{{ _bootstrap_token }}"

# Re-load the vault into the current play's variable scope so plane_users
# / plane_projects / plane_bootstrap (which include_vars at task time)
# see the freshly-minted admin_token without needing a second playbook
# invocation.
- name: Re-load vault with the freshly-merged admin_token
  ansible.builtin.include_vars: "{{ playbook_dir }}/vault/{{ vault_secrets_file }}"
  no_log: true
