- name: Load plane vault secrets
  ansible.builtin.include_vars: "{{ playbook_dir }}/vault/{{ vault_secrets_file }}"

- name: Assert role inputs are defined
  ansible.builtin.assert:
    that:
      - plane.admin_token is defined
      - plane.admin_token | length > 0
      - plane_workspace.slug is defined
      - plane_workspace.slug | length > 0
      - agents is defined
    fail_msg: >-
      Missing required config. Needed: `plane.admin_token` in the vault
      file (ansible/vault/{{ vault_secrets_file }}) — a workspace API
      token generated via the Plane UI under Workspace Settings → API
      tokens, must belong to a workspace Admin — plus
      `plane_workspace.slug` and `agents` in group_vars.

- name: Ensure invitation output directory exists (controller)
  ansible.builtin.file:
    path: "{{ plane_users_invitation_output_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true

# The external API (/api/v1/) accepts X-Api-Key but does NOT dispatch
# invitation emails (that's only in the session-auth app API). So each run
# refreshes this file with whatever pending invitations exist in the
# workspace — operator uses it as a checklist for the "Resend invitation"
# clicks in the UI.
- name: Reset invitation output file (controller)
  ansible.builtin.copy:
    dest: "{{ plane_users_invitation_output_file }}"
    content: |
      # Generated by the plane_users role. Lists workspace invitations that
      # exist in Plane but have not been accepted yet. The external v1 API
      # does not trigger invitation emails — to actually deliver these,
      # open each entry in the Plane UI (Workspace Settings → Members →
      # Pending invites) and click "Resend invitation".
      plane_pending_invitations:
    mode: "0600"
  delegate_to: localhost
  become: false
  run_once: true

- name: List existing workspace members
  ansible.builtin.uri:
    url: "{{ plane_users_api_base }}/workspaces/{{ plane_workspace.slug }}/members/"
    method: GET
    headers:
      X-Api-Key: "{{ plane.admin_token }}"
    status_code: 200
    validate_certs: "{{ plane_users_validate_certs }}"
    return_content: true  # ensure .content + .json are populated
  register: plane_members_lookup
  delegate_to: localhost
  become: false
  # Read-only — run even in --check so downstream idempotency math works.
  check_mode: false

- name: List existing workspace invitations
  ansible.builtin.uri:
    url: "{{ plane_users_api_base }}/workspaces/{{ plane_workspace.slug }}/invitations/"
    method: GET
    headers:
      X-Api-Key: "{{ plane.admin_token }}"
    status_code: 200
    validate_certs: "{{ plane_users_validate_certs }}"
    return_content: true
  register: plane_invitations_lookup
  delegate_to: localhost
  become: false
  check_mode: false

# Both endpoints return a flat list with `.email` at top level. Lowercase
# normalized so a stray capital in group_vars doesn't double-invite.
- name: Compute set of emails already covered (member or invited)
  ansible.builtin.set_fact:
    plane_existing_emails: >-
      {{
        ((plane_members_lookup.json | map(attribute='email') | list)
         + (plane_invitations_lookup.json | map(attribute='email') | list))
        | map('lower') | list
      }}

- name: Compute agents still to invite
  ansible.builtin.set_fact:
    plane_agents_to_invite: >-
      {{ agents | rejectattr('email', 'in', plane_existing_emails) | list }}

- name: Summarize provisioning plan
  ansible.builtin.debug:
    msg:
      - "Workspace '{{ plane_workspace.slug }}': {{ plane_members_lookup.json | length }} member(s), {{ plane_invitations_lookup.json | length }} pending invitation(s)."
      - "Agents to invite this run: {{ plane_agents_to_invite | map(attribute='email') | list }}"

# Per-invite POST — serializer rejects batch. Retries on conflict are
# safe (400 EMAIL_ALREADY_INVITED / EMAIL_ALREADY_EXISTS_IN_WORKSPACE) but
# we've already filtered via GET so normal runs hit neither.
- name: Create workspace invitations
  ansible.builtin.uri:
    url: "{{ plane_users_api_base }}/workspaces/{{ plane_workspace.slug }}/invitations/"
    method: POST
    headers:
      X-Api-Key: "{{ plane.admin_token }}"
      Content-Type: application/json
    body_format: json
    body:
      email: "{{ item.email }}"
      # Cast to int — plane's validate_role uses int comparison. Sending a
      # string lands a JSON "15", which trips the check on strict builds.
      role: "{{ plane_users_role | int }}"
    status_code: [200, 201]
    validate_certs: "{{ plane_users_validate_certs }}"
  loop: "{{ plane_agents_to_invite }}"
  loop_control:
    label: "{{ item.email }}"
  delegate_to: localhost
  become: false
  register: plane_invite_results

# Re-fetch after create so the output file reflects full current state
# (including entries created just now). GET response includes id+email+role
# but NOT the jwt token — accept URLs can only be copied from the UI.
- name: Re-list invitations after create
  when: plane_agents_to_invite | length > 0
  ansible.builtin.uri:
    url: "{{ plane_users_api_base }}/workspaces/{{ plane_workspace.slug }}/invitations/"
    method: GET
    headers:
      X-Api-Key: "{{ plane.admin_token }}"
    status_code: 200
    validate_certs: "{{ plane_users_validate_certs }}"
  register: plane_invitations_final
  delegate_to: localhost
  become: false
  check_mode: false

- name: Use latest invitation list (fall back to pre-create list)
  ansible.builtin.set_fact:
    plane_invitations_current: >-
      {{ plane_invitations_final.json
         if (plane_agents_to_invite | length > 0)
         else plane_invitations_lookup.json }}

# Copy above resets the file at each run, so lineinfile is always in
# "append if not present" mode — no regexp needed, exact-line match is enough.
- name: Persist pending invitations to controller-local file
  ansible.builtin.lineinfile:
    path: "{{ plane_users_invitation_output_file }}"
    line: "  - email: {{ item.email }}    # role={{ item.role }}  id={{ item.id }}  accepted={{ item.accepted | default(false) }}"
    insertafter: "^plane_pending_invitations:"
    mode: "0600"
  loop: "{{ plane_invitations_current | selectattr('accepted', 'equalto', false) | list }}"
  loop_control:
    label: "{{ item.email }}"
  delegate_to: localhost
  become: false

# ────────────────────────────────────────────────────────────────────────
# Token backfill — the SECOND v1.3.0 external-API bug we have to work
# around. Plane's app API generates the JWT `token` at invite creation
# (`token=jwt.encode(...)` in apps/api/plane/app/views/workspace/invite.py),
# but the external API's `WorkspaceInviteSerializer` omits `token` from
# its Meta.fields, so `serializer.save()` never sets it and the DB row
# lands with `token=""`. Consequences:
#   1. `workspace_invitation.delay(...)` still "succeeds" (the inner
#      `WorkspaceMemberInvite.objects.get(token="", email=X)` finds the
#      one matching row because email is unique), but the accept URL in
#      the email has `token=` empty → the accept endpoint 403s.
#   2. The UI's "Copy Link" renders the same broken URL.
# Fix: after creating invites via the external API, generate tokens
# ourselves using the same jwt.encode call the app API uses. Filter by
# `token=""` so the task is idempotent — it only touches rows missing
# a token, so rerunning the role leaves already-valid tokens alone.
- name: Backfill missing JWT tokens on invitations
  when: not ansible_check_mode
  ansible.builtin.shell:
    cmd: |
      cat <<'PYEOF' | docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api python manage.py shell
      import jwt
      from datetime import datetime
      from django.conf import settings
      from plane.db.models import WorkspaceMemberInvite, Workspace
      EMAILS = {{ (agents | map(attribute='email') | list) | to_json }}
      w = Workspace.objects.get(slug="{{ plane_workspace.slug }}")
      backfilled = []
      for inv in WorkspaceMemberInvite.objects.filter(
          workspace=w, email__in=EMAILS, token=""
      ):
          # Payload shape mirrors the app API — accept endpoint today only
          # does string comparison on the token, so the payload body is
          # not inspected; matching upstream hedges against future changes.
          inv.token = jwt.encode(
              {"email": {"email": inv.email, "role": inv.role},
               "timestamp": datetime.now().timestamp()},
              settings.SECRET_KEY,
              algorithm="HS256",
          )
          inv.save(update_fields=["token"])
          backfilled.append(inv.email)
      # Single CHANGED/UNCHANGED line so changed_when is unambiguous —
      # avoids the substring trap where 'backfilled:' would match a
      # 'total_backfilled: 0' summary line.
      print("BACKFILL_RESULT:", "CHANGED" if backfilled else "UNCHANGED",
            "count=" + str(len(backfilled)),
            "emails=" + ",".join(backfilled))
      PYEOF
  register: plane_backfill_result
  changed_when: "'BACKFILL_RESULT: CHANGED' in (plane_backfill_result.stdout | default(''))"

- name: Show backfill result
  when:
    - plane_backfill_result is defined
    - plane_backfill_result.stdout is defined
  ansible.builtin.debug:
    var: plane_backfill_result.stdout_lines

# ────────────────────────────────────────────────────────────────────────
# Invitation-email dispatch shim — see CLAUDE.md "Plane users specifics"
# for the long version. Short version: Plane v1.3.0's external /api/v1/
# invitation endpoint creates the DB row but does NOT dispatch the email.
# The in-product "Resend invitation" button doesn't exist in v1.3.0, and
# the "Copy Link" URL omits the JWT `token` (it's not in any serializer),
# so accept-URLs copied from the UI come back 403. The only supported
# path left is to fire Plane's own `workspace_invitation` Celery task
# from inside the api container — the same task a working Resend button
# would call. The worker container consumes it, renders Plane's email
# template (with the real token), and sends via the InstanceConfiguration
# SMTP rows set manually in /god-mode/.
#
# This is explicitly a HACK:
#   - It imports from `plane.bgtasks.workspace_invitation_task`, a path
#     internal to Plane's Django app. A rename on upgrade would silently
#     skip the dispatch. If the role starts failing here after a Plane
#     bump, check the upstream path before patching.
#   - It reaches into `plane.db.models.WorkspaceMemberInvite` to pull the
#     JWT token — cannot be done over the REST API in v1.3.0.
#   - It runs inside the `api` container via `docker compose exec`, so
#     this task is the one part of the role that isn't controller-local.
#
# Idempotency: the default behavior is to dispatch only for the emails
# we JUST invited this run (`plane_agents_to_invite`). Rerunning the
# role on a stable state is a no-op (nothing new invited → nothing
# dispatched). For a manual re-dispatch of all pending invitations, run
# with `-e plane_users_force_dispatch=true`.
- name: Compute emails to dispatch invitation mails for
  ansible.builtin.set_fact:
    plane_emails_to_dispatch: >-
      {{
        (plane_invitations_current
           | selectattr('accepted', 'equalto', false)
           | map(attribute='email') | list)
        if (plane_users_force_dispatch | bool)
        else (plane_agents_to_invite | map(attribute='email') | list)
      }}

# --check skips the shell exec (side-effecting Celery dispatch). The guard
# below is `not ansible_check_mode` rather than bare check_mode: false
# because this task IS side-effecting — we want --check to skip it.
# `cmd:` dict form (not free-form) — Ansible's shell free-form parser
# treats bare `key=value` tokens as module args, and our Python has plenty
# of them (workspace=w, email__in=EMAILS, …) which triggers "failed at
# splitting arguments" errors. `cmd:` passes the block through untouched.
- name: Dispatch invitation emails via Plane's Celery task
  when:
    - plane_emails_to_dispatch | length > 0
    - not ansible_check_mode
  ansible.builtin.shell:
    cmd: |
      cat <<'PYEOF' | docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api python manage.py shell
      # Passed emails verbatim via to_json so any future oddities in the
      # agent list (quotes, unicode) survive the shell → python boundary.
      EMAILS = {{ plane_emails_to_dispatch | to_json }}
      from plane.db.models import WorkspaceMemberInvite, Workspace
      from plane.bgtasks.workspace_invitation_task import workspace_invitation
      w = Workspace.objects.get(slug="{{ plane_workspace.slug }}")
      inviter = "{{ plane_workspace.owner_email }}"
      n = 0
      for inv in WorkspaceMemberInvite.objects.filter(
          workspace=w, email__in=EMAILS, responded_at__isnull=True, accepted=False
      ):
          workspace_invitation.delay(
              inv.email, str(w.id), inv.token,
              "https://{{ domain_plane }}", inviter,
          )
          # Plain concat — avoid f-strings in templates so Jinja's `{email}`
          # detector has nothing to trip on; also dodges the quoting knot.
          print("dispatched: " + inv.email)
          n += 1
      print("total: " + str(n))
      PYEOF
  register: plane_dispatch_result
  changed_when: "'dispatched:' in (plane_dispatch_result.stdout | default(''))"

- name: Show dispatch result
  when:
    - plane_dispatch_result is defined
    - plane_dispatch_result.stdout is defined
  ansible.builtin.debug:
    var: plane_dispatch_result.stdout_lines

# ────────────────────────────────────────────────────────────────────────
# Auto-accept agent invitations on behalf of bot identities.
#
# Plane's invitation flow expects a human to click an accept-link in
# the email Celery dispatched above. Our agents are bots — they have no
# inbox and can't click anything. Without this step they'd sit forever
# in "Pending Invitations" and the mint task below would skip them
# (no User row → no APIToken target).
#
# So we mirror the upstream WorkspaceJoinEndpoint by hand: for each
# pending invitation matching an agent in our list, create the User,
# create the Profile, create the WorkspaceMember at the invitation's
# role, then delete the invitation. Idempotent: re-runs that find no
# pending invitations for our agents are a no-op.
#
# Agent accounts are API-only: the framework uses workspace API tokens
# (X-API-Key) for every Plane operation. UI login is intentionally not
# supported. To satisfy Django's `password` NOT NULL column we hash a
# random uuid4 — the plaintext is generated, used for the hash, and
# discarded. Nobody (including the operator) ever sees it. If a human
# admin needs to inspect Plane as a specific agent, reset the password
# via Plane's admin UI (Workspace Settings → Members → reset).
- name: Auto-accept agent invitations (create User + Profile + WorkspaceMember — API-only, no UI password persisted)
  when: not ansible_check_mode
  ansible.builtin.shell:
    cmd: |
      cat <<'PYEOF' | docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api python manage.py shell
      from uuid import uuid4
      from django.contrib.auth.hashers import make_password
      from django.utils import timezone
      from plane.db.models import (
          User, Profile, Workspace, WorkspaceMember, WorkspaceMemberInvite,
      )
      AGENTS = {{ agents | to_json }}
      AGENTS_BY_EMAIL = { a["email"].lower(): a for a in AGENTS }
      w = Workspace.objects.get(slug="{{ plane_workspace.slug }}")
      accepted = []
      for inv in WorkspaceMemberInvite.objects.filter(
          workspace=w,
          email__in=list(AGENTS_BY_EMAIL.keys()),
          accepted=False,
      ):
          agent = AGENTS_BY_EMAIL[inv.email.lower()]
          first, _, last = agent["full_name"].partition(" ")
          user = User.objects.filter(email=inv.email.lower()).first()
          if user is None:
              # Hash a random plaintext to satisfy the password column;
              # the plaintext is local to this Python process and never
              # leaves it. Account is API-only.
              user = User.objects.create(
                  email=inv.email.lower(),
                  first_name=first,
                  last_name=last,
                  username=uuid4().hex,
                  password=make_password(uuid4().hex),
                  is_password_autoset=False,
                  is_active=True,
                  is_email_verified=True,
                  last_active=timezone.now(),
                  last_login_time=timezone.now(),
                  token_updated_at=timezone.now(),
              )
          # Profile is NOT auto-created on User.save in v1.3.0 — see
          # plane_admin notes for the same workaround.
          Profile.objects.get_or_create(user=user)
          # WorkspaceMember at the invitation's role (typically 15 = Member).
          WorkspaceMember.objects.get_or_create(
              workspace=w, member=user,
              defaults={"role": inv.role, "is_active": True},
          )
          # Delete the invitation — mirrors WorkspaceJoinEndpoint's behavior.
          inv.delete()
          accepted.append(inv.email)
      # Single CHANGED/UNCHANGED line — same pattern as backfill, avoids
      # the substring trap where 'accepted:' would match 'total-accepted:'.
      print("ACCEPT_RESULT:", "CHANGED" if accepted else "UNCHANGED",
            "count=" + str(len(accepted)),
            "emails=" + ",".join(accepted))
      PYEOF
  register: plane_accept_result
  changed_when: "'ACCEPT_RESULT: CHANGED' in (plane_accept_result.stdout | default(''))"

- name: Show auto-accept result
  when:
    - plane_accept_result is defined
    - plane_accept_result.stdout is defined
  ansible.builtin.debug:
    var: plane_accept_result.stdout_lines

# ────────────────────────────────────────────────────────────────────────
# API-token minting. Uses the ORM directly via docker exec because
# Plane's v1.3.0 external API has no token-create endpoint (`api-tokens/`
# is only reachable via the session-auth app API, and we can't session-
# auth as each agent). Tokens are stored plaintext in `api_tokens.token`
# (see `plane.db.models.api.APIToken`: `default=generate_token` returns
# `"plane_api_" + uuid4().hex`), so the same ORM select that detects
# existing tokens can read the value back out — no force-rotate path
# needed, and re-runs are safe.
#
# Skips agents without an active WorkspaceMember row — those are entries
# where the invitation is still pending accept (we can't mint a token
# for a user that doesn't have a User row yet).
#
# Output is emitted as a single JSON blob between unambiguous markers
# so the controller-side parse isn't sensitive to stray stdout (e.g.
# Django warnings, Celery init messages).
- name: Mint Plane API tokens for accepted agents
  when: not ansible_check_mode
  ansible.builtin.shell:
    cmd: |
      cat <<'PYEOF' | docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api python manage.py shell
      import json
      from plane.db.models import APIToken, User, Workspace, WorkspaceMember
      AGENTS = {{ agents | to_json }}
      LABEL = "{{ plane_users_token_label }}"
      DESC = "Managed by ansible plane_users role"
      w = Workspace.objects.get(slug="{{ plane_workspace.slug }}")
      tokens = {}
      skipped = []
      for a in AGENTS:
          u = User.objects.filter(email=a["email"]).first()
          if u is None:
              skipped.append(a["username"] + " (no User row — invite not accepted)")
              continue
          member = WorkspaceMember.objects.filter(
              workspace=w, member=u, is_active=True
          ).first()
          if member is None:
              skipped.append(a["username"] + " (not an active workspace member)")
              continue
          # user_type=1 marks the token as Bot-owned in Plane's UI; matches
          # the intent (these are automation identities, not humans).
          t = APIToken.objects.filter(user=u, workspace=w, label=LABEL).first()
          if t is None:
              t = APIToken.objects.create(
                  user=u, workspace=w, label=LABEL,
                  user_type=1, description=DESC,
              )
              print("minted: " + a["username"])
          else:
              print("reused: " + a["username"])
          tokens[a["username"]] = t.token
      print("===PLANE_TOKENS_JSON===")
      print(json.dumps(tokens))
      print("===END===")
      for s in skipped:
          print("skipped: " + s)
      PYEOF
  register: plane_mint_result
  changed_when: "'minted:' in (plane_mint_result.stdout | default(''))"

- name: Show mint result
  when:
    - plane_mint_result is defined
    - plane_mint_result.stdout is defined
  ansible.builtin.debug:
    var: plane_mint_result.stdout_lines

# Pull the JSON blob out of mint stdout. If the regex doesn't match
# (e.g. check-mode where the shell was skipped), default to {} so the
# write below renders an empty-agents file instead of exploding.
- name: Parse minted-token JSON from stdout
  when:
    - plane_mint_result is defined
    - plane_mint_result.stdout is defined
  ansible.builtin.set_fact:
    plane_agent_tokens_map: >-
      {{
        (plane_mint_result.stdout
          | regex_search('===PLANE_TOKENS_JSON===\n(\{.*\})\n===END===', '\1')
          | first
          | from_json)
        if (plane_mint_result.stdout is search('===PLANE_TOKENS_JSON==='))
        else {}
      }}

- name: Persist Plane agent tokens to controller-local file
  when: plane_agent_tokens_map is defined
  ansible.builtin.copy:
    dest: "{{ plane_users_token_output_file }}"
    content: |
      # Generated by the plane_users role. Contains Plane API tokens for
      # agents that have accepted their workspace invitation. Tokens are
      # workspace-scoped (label: {{ plane_users_token_label }}) and never
      # expire — rotate by deleting the APIToken row in Plane's UI
      # (Workspace Settings → API tokens) and re-running the role.
      plane_agent_tokens:
      {% for username, token in (plane_agent_tokens_map | dictsort) %}
        {{ username }}: {{ token }}
      {% endfor %}
    mode: "0600"
  delegate_to: localhost
  become: false

# ────────────────────────────────────────────────────────────────────────
# Per-agent profile: timezone + first-day-of-week. Plane's external API
# has no endpoint to write another user's `User.user_timezone` or
# `Profile.start_of_the_week` — the only self-profile endpoint is
# session-auth'd on the app API (`/api/users/me/`) and unreachable with
# our workspace API token. Same docker-exec ORM hack as the other
# plane_users internals.
#
# Idempotent: each field is compared to the requested value; `.save()`
# is only called when something actually differs. Agents not yet
# accepted (no User row) and agents without a Profile row (shouldn't
# happen — signup creates Profile on first login — but handle it) are
# logged + skipped.
- name: Apply per-agent timezone + first-day-of-week
  when: not ansible_check_mode
  ansible.builtin.shell:
    cmd: |
      cat <<'PYEOF' | docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api python manage.py shell
      from plane.db.models import User, Profile
      EMAILS = {{ (agents | map(attribute='email') | list) | to_json }}
      TZ = "{{ plane_users_agent_timezone }}"
      SOTW = {{ plane_users_agent_start_of_week | int }}
      changed = 0
      for email in EMAILS:
          u = User.objects.filter(email=email).first()
          if u is None:
              print("skipped: " + email + " (no User row)")
              continue
          if u.user_timezone != TZ:
              u.user_timezone = TZ
              u.save(update_fields=["user_timezone"])
              print("tz-updated: " + email)
              changed += 1
          p = Profile.objects.filter(user=u).first()
          if p is None:
              print("skipped-profile: " + email + " (no Profile row)")
              continue
          if p.start_of_the_week != SOTW:
              p.start_of_the_week = SOTW
              p.save(update_fields=["start_of_the_week"])
              print("sotw-updated: " + email)
              changed += 1
      print("total-changes: " + str(changed))
      PYEOF
  register: plane_profile_result
  changed_when: "'-updated:' in (plane_profile_result.stdout | default(''))"

- name: Show per-agent profile update result
  when:
    - plane_profile_result is defined
    - plane_profile_result.stdout is defined
  ansible.builtin.debug:
    var: plane_profile_result.stdout_lines

# ────────────────────────────────────────────────────────────────────────
# Email notification opt-out. Agents are bots and have no inbox; leaving
# UserNotificationPreference at the default (everything True) means the
# api container queues emails on every state change for ten phantom
# recipients. Flip all five booleans to False per agent. Idempotent —
# only saves when something is actually still True.
- name: Disable email notifications for agents
  when: not ansible_check_mode
  ansible.builtin.shell:
    cmd: |
      cat <<'PYEOF' | docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api python manage.py shell
      from plane.db.models import User, UserNotificationPreference
      EMAILS = {{ (agents | map(attribute='email') | list) | to_json }}
      n = 0
      for email in EMAILS:
          u = User.objects.filter(email=email.lower()).first()
          if u is None:
              continue
          # Auto-created on User.save in v1.3.0, but get_or_create as a
          # belt+suspenders against environments where the signal didn't
          # fire (e.g. legacy data).
          np, _ = UserNotificationPreference.objects.get_or_create(user=u)
          if any([np.property_change, np.state_change, np.comment, np.mention, np.issue_completed]):
              np.property_change = False
              np.state_change = False
              np.comment = False
              np.mention = False
              np.issue_completed = False
              np.save()
              print("notif-disabled: " + email)
              n += 1
      print("total: " + str(n))
      PYEOF
  register: plane_notif_result
  changed_when: "'notif-disabled:' in (plane_notif_result.stdout | default(''))"

- name: Show notification opt-out result
  when:
    - plane_notif_result is defined
    - plane_notif_result.stdout is defined
  ansible.builtin.debug:
    var: plane_notif_result.stdout_lines

# ────────────────────────────────────────────────────────────────────────
# Avatar upload. The framework ships one PNG per persona under
# avatars/<username>.png. We push them to a host staging dir, copy
# them into the api container, then ORM-create FileAsset rows
# (entity_type=USER_AVATAR) and link them via user.avatar_asset.
# Storage backend writes the bytes to MinIO automatically on
# FileField.save(). Idempotent: skips agents whose avatar_asset_id
# is already populated.
#
# We pre-check via the ORM whether any avatar is still missing — if
# every agent already has an avatar_asset_id the staging+copy+upload
# steps all skip. Without this guard, the staging dir gets re-created
# on every run (Cleanup at the end deletes it) which makes idempotent
# re-runs noisy with `changed=true` on harmless temp-file shuffling.
- name: Check which agents are still missing an avatar
  when: not ansible_check_mode
  ansible.builtin.shell:
    cmd: |
      cat <<'PYEOF' | docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api python manage.py shell
      from plane.db.models import User
      AGENTS = {{ agents | to_json }}
      missing = []
      for a in AGENTS:
          u = User.objects.filter(email=a["email"].lower()).first()
          if u is None or u.avatar_asset_id is None:
              missing.append(a["username"])
      print("AVATARS_MISSING_COUNT:", len(missing))
      print("AVATARS_MISSING_USERS:", ",".join(missing))
      PYEOF
  register: plane_avatar_check
  changed_when: false

- name: Set avatar-needed flag (skip staging entirely when nothing missing)
  ansible.builtin.set_fact:
    plane_avatars_needed: >-
      {{ 'AVATARS_MISSING_COUNT: 0' not in (plane_avatar_check.stdout | default('AVATARS_MISSING_COUNT: 999')) }}

- name: Ensure avatar staging directory exists on host
  when: plane_avatars_needed | bool
  ansible.builtin.file:
    path: "{{ plane_users_avatar_stage_dir }}"
    state: directory
    mode: "0755"

- name: Stage agent avatars on host
  when: plane_avatars_needed | bool
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ plane_users_avatar_stage_dir }}/{{ item | basename }}"
    mode: "0644"
  with_fileglob:
    - "{{ playbook_dir }}/../avatars/*.png"

- name: Push avatars into api container
  when: plane_avatars_needed | bool
  ansible.builtin.shell:
    cmd: |
      docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api mkdir -p {{ plane_users_avatar_container_dir }}
      docker compose -f {{ plane_users_plane_dir }}/compose.yaml cp {{ plane_users_avatar_stage_dir }}/. api:{{ plane_users_avatar_container_dir }}/
  changed_when: false  # mechanical, hides changed-noise; the ORM step below carries the real `changed` signal

- name: Upload avatars + link to User.avatar_asset
  when:
    - not ansible_check_mode
    - plane_avatars_needed | bool
  ansible.builtin.shell:
    cmd: |
      cat <<'PYEOF' | docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api python manage.py shell
      # Mirrors apps/api/plane/app/views/asset/v2.py UserAssetEndpoint POST
      # for the USER_AVATAR upload pattern. Bypasses the FileField.save()
      # path entirely — Plane's S3Storage subclass overrides __init__
      # without calling super(), so attributes the parent class expects
      # (`file_overwrite`, etc.) are missing and the django-storages
      # `get_available_name` call blows up. Plane itself works around
      # this by only ever using S3Storage for presigned-URL flows; for
      # our ORM-direct path we go straight to boto3 with the same
      # MinIO env config.
      import os
      import uuid
      import boto3
      from plane.db.models import User, FileAsset
      AGENTS = {{ agents | to_json }}
      AVATAR_DIR = {{ plane_users_avatar_container_dir | to_json }}
      s3 = boto3.client(
          "s3",
          aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
          aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
          region_name=os.environ.get("AWS_REGION") or None,
          endpoint_url=os.environ["AWS_S3_ENDPOINT_URL"],
          config=boto3.session.Config(signature_version="s3v4"),
      )
      bucket = os.environ["AWS_S3_BUCKET_NAME"]
      n = 0
      for agent in AGENTS:
          u = User.objects.filter(email=agent["email"].lower()).first()
          if u is None:
              continue
          if u.avatar_asset_id is not None:
              continue  # avatar already linked — leave it alone
          path = os.path.join(AVATAR_DIR, agent["username"] + ".png")
          if not os.path.exists(path):
              print("avatar-missing: " + agent["username"])
              continue
          with open(path, "rb") as f:
              content = f.read()
          name = agent["username"] + ".png"
          asset_key = uuid.uuid4().hex + "-" + name
          s3.put_object(
              Bucket=bucket,
              Key=asset_key,
              Body=content,
              ContentType="image/png",
          )
          # USER_AVATAR is user-scoped, not workspace-scoped (see the
          # upstream view — no workspace field on the create).
          fa = FileAsset.objects.create(
              attributes={"name": name, "type": "image/png", "size": len(content)},
              asset=asset_key,
              size=len(content),
              user=u,
              created_by=u,
              entity_type=FileAsset.EntityTypeContext.USER_AVATAR,
              is_uploaded=True,
          )
          u.avatar_asset = fa
          u.save(update_fields=["avatar_asset"])
          print("avatar-uploaded: " + agent["email"])
          n += 1
      print("total: " + str(n))
      PYEOF
  register: plane_avatar_result
  changed_when: "'avatar-uploaded:' in (plane_avatar_result.stdout | default(''))"

- name: Show avatar upload result
  when:
    - plane_avatar_result is defined
    - plane_avatar_result.stdout is defined
  ansible.builtin.debug:
    var: plane_avatar_result.stdout_lines

- name: Clean up avatar staging in api container
  when: plane_avatars_needed | bool
  ansible.builtin.shell:
    cmd: docker compose -f {{ plane_users_plane_dir }}/compose.yaml exec -T api rm -rf {{ plane_users_avatar_container_dir }}
  changed_when: false

- name: Clean up avatar staging on host
  when: plane_avatars_needed | bool
  ansible.builtin.file:
    path: "{{ plane_users_avatar_stage_dir }}"
    state: absent
